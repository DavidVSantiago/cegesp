<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CEGESP - InfoDados</title>
    <script src="../../server_simulator.js"></script>
    <script src="../../min.js"></script>
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="../../algol-light-green.css">
    <link rel="import" href="../../templates/header/header.html">
    <link rel="import" href="../../templates/header/header.css">
    <link rel="stylesheet" href="infodados.css">
</head>
<body>
    <header id="header">CARREGADO DINAMICAMENTE!</header>

   <main>
        <algol-grid-layout cols="1fr" padding="0 5" paddingbreak="0 2">
            <algol-grid-item posh="center" width="100%">
                
                <h2 class="page-title">ACESSO AOS DOCUMENTOS OFICIAIS</h2>
                <algol-spacer value="3" valuebreak="2"></algol-spacer>

                <div class="form-container algol-bubble-01">
                    <form id="infodadosForm">
                        
                        <p class="form-label">Palavra-Chave:</p>
                        <algol-select name="keyword" id="keyword" required>
                            <option value="vacina">Vacina</option>
                        </algol-select>

                        <p class="form-label">Esfera:</p>
                        <algol-select name="esfera" id="esfera" required>
                            <option value="f">Federal</option>
                            <option value="e">Estadual</option>
                            <option value="m">Municipal</option>
                        </algol-select>

                        <div id="dynamic-fields">
                            <div id="ufGroup" class="hidden">
                                <p class="form-label">UF:</p>
                                <algol-select name="uf" id="uf"></algol-select>
                            </div>
                            
                            <div id="agrupamentoGroup" class="hidden">
                                <p class="form-label">Agrupamento:</p>
                                <algol-grid-layout cols="1fr 1fr" gap="1" gapbreak="0.5">
                                    <algol-switch-radio name="agrupamento" value="municipio" label="Por município"></algol-switch-radio>
                                    <algol-switch-radio name="agrupamento" value="territorio" label="Por território"></algol-switch-radio>
                                </algol-grid-layout>
                                <algol-spacer value="1.5"></algol-spacer>
                            </div>
                        </div>

                        <p class="form-label">Agenda</p>
                        <algol-grid-layout cols="repeat(3, 1fr)" colsbreak="1fr" gap="1.5" posh="stretch">
                            <algol-button size="medium" type="button" color="white" textcolor="#333" class="btn-filter">Executivo</algol-button>
                            <algol-button size="medium" type="button" color="white" textcolor="#333" class="btn-filter">Legislativo</algol-button>
                            <algol-button size="medium" type="button" color="white" textcolor="#333" class="btn-filter">Judiciário</algol-button>
                        </algol-grid-layout>

                        <algol-spacer value="2"></algol-spacer>

                        <p class="form-label">Tipo de documento:</p>
                        <algol-select name="indicador" id="indicador">
                            <option value="loa">LOA</option>
                        </algol-select>

                        <p class="form-label">Período</p>
                        <algol-grid-layout cols="1fr 1fr" colsbreak="1fr" gap="2" gapbreak="1" posh="stretch">
                            <algol-input-number name="start-year" placeholder="Ano de Início: Ex 2000"></algol-input-number>
                            <algol-input-number name="end-year" placeholder="Ano Final: Ex 2025"></algol-input-number>
                        </algol-grid-layout>

                        <algol-spacer value="3"></algol-spacer>

                        <algol-button type="submit" color="#2d6fff" textcolor="white" size="big">Buscar</algol-button>
                    </form>
                </div>
            </algol-grid-item>
        </algol-grid-layout>
    </main>
</algol-grid-item>

    <footer id="footer">CARREGADO DINAMICAMENTE!</footer>
</body>
</html>
